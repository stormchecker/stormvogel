name: Docs

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYTHON_VERSION: '3.12'
  PRECOMMIT_VERSION: '3.7.1'

jobs:
  get-tag:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        run: |
          TAG=$(git tag --sort=version:refname | grep -E '^v[0-9]' | tail -1)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  build:
    needs: get-tag
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    container:
      image: movesrwth/stormpy:ci-debug
    strategy:
      matrix:
        include:
          - ref: ''
            name: latest
            release_url: 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ needs.get-tag.outputs.tag }}/'
            release_tag: ${{ needs.get-tag.outputs.tag }}
          - ref: ${{ needs.get-tag.outputs.tag }}
            name: ${{ needs.get-tag.outputs.tag }}
            release_url: ''
            release_tag: ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update
          apt-get -y install curl
          apt-get -y install git
          apt-get -y install pandoc
          apt-get -y install libcairo2-dev

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install project dependencies
        run: poetry install

      - name: Install extra dependencies
        run: poetry run pip install stormpy pyscipopt paynt

      - name: Glob python files in docs folder
        uses: tj-actions/glob@v22
        id: globpy
        with:
          files: |
            docs/**/*.py
          excluded-files: |
            docs/conf.py

      - name: Generate documentation notebooks from jupytext
        run: |
          poetry run jupytext --to notebook ${{ steps.globpy.outputs.paths }}

      - name: Glob notebooks in docs folder
        uses: tj-actions/glob@v22
        id: glob
        with:
          files: |
            docs/**/*.ipynb

      - name: Run documentation notebooks
        env:
          DOCUMENTATION: 1
        run: |
          poetry run jupyter nbconvert --execute --to notebook --inplace ${{ steps.glob.outputs.paths }} --ExecutePreprocessor.kernel_name=python3

      - name: Generate docs
        working-directory: docs/
        env:
          RELEASE_DOCS_URL: ${{ matrix.release_url }}
          RELEASE_TAG: ${{ matrix.release_tag }}
        run: make html

      - name: Copy gifs
        run: cp -r docs/4-Reinforcement-Learning/gifs docs/_build/html/4-Reinforcement-Learning/ || true

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.name }}
          path: docs/_build/html/

  deploy:
    needs: [get-tag, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - name: Download latest docs
        uses: actions/download-artifact@v4
        with:
          name: docs-latest
          path: site/latest/

      - name: Download release docs
        uses: actions/download-artifact@v4
        with:
          name: docs-${{ needs.get-tag.outputs.tag }}
          path: site/${{ needs.get-tag.outputs.tag }}/

      - name: Create root redirect
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=latest/" />
            </head>
            <body>
              <p>Redirecting to <a href="latest/">latest documentation</a>…</p>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
